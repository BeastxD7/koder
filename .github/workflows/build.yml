name: Build LakshX

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.17.0"
      - name: Install agent deps
        working-directory: agent
        run: npm ci
      - name: Typecheck runtime
        working-directory: agent
        run: npm run typecheck
      - name: Unit + E2E tests
        working-directory: agent
        run: npm run test:unit

  build:
    needs: test
    # full 4-platform package build is expensive (macOS especially, limited
    # concurrent runner slots) — only worth it for an actual release artifact
    # or an explicit on-demand check, not on every push while iterating
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
            artifact: LakshX-macOS-arm64
          # macos-13 (Intel, darwin-x64) dropped: Apple Silicon is the
          # dominant current Mac hardware, and the macos-13 runner label has
          # repeatedly sat "queued" for 30+ minutes without ever starting
          # (a GitHub-side runner-capacity issue for that label, not a build
          # failure) rather than actually building.
          - os: windows-2022
            target: win32-x64
            artifact: LakshX-Windows-x64
          - os: ubuntu-latest
            target: linux-x64
            artifact: LakshX-Linux-x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24.17.0"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++ libx11-dev libxkbfile-dev libsecret-1-dev libkrb5-dev fakeroot rpm

      - name: Fetch pinned code-oss
        shell: bash
        run: ./scripts/fetch-vscode.sh

      - name: Bundle agent runtime
        shell: bash
        run: |
          cd agent
          npm ci
          npm run bundle

      - name: Apply LakshX overlay
        shell: bash
        run: ./scripts/prepare.sh

      # @vscode/ripgrep's postinstall downloads a binary from GitHub releases;
      # unauthenticated requests from shared Actions IP ranges get 403'd by
      # GitHub's rate limiter. GITHUB_TOKEN (auto-provided) fixes that, and
      # doubles as auth for the many other npm/GitHub calls postinstall makes.
      - name: Install upstream dependencies
        shell: bash
        working-directory: upstream
        # code-oss's postinstall fires ~40-50 parallel per-extension npm
        # installs, which crashes with a bare (no-workspace-prefix, i.e. from
        # npm's own top-level process, not a per-extension one) "spawn
        # /bin/sh ENOENT" on macOS only, reproduced identically on every
        # retry across two separate runs. Raising just the open-file soft
        # limit (`ulimit -n 10240`, previous attempt) did NOT fix it, which
        # rules out plain fd exhaustion as the sole cause — macOS also caps
        # max-processes-per-user (`ulimit -u`) separately from open files,
        # and that's the more likely fit for ~50 concurrent npm child
        # processes each forking further children. Raise both soft limits to
        # their hard ceiling (falling back to a fixed number if the hard
        # limit itself is low/unlimited-unparseable) and dump the actual
        # before/after values + kernel proc limits to the log so this is
        # verifiable either way. Retry loop kept as defense-in-depth for
        # genuine transient flakes.
        run: |
          echo "before: nofile=$(ulimit -n) (hard $(ulimit -Hn)), nproc=$(ulimit -u 2>/dev/null || echo n/a) (hard $(ulimit -Hu 2>/dev/null || echo n/a))"
          sysctl kern.maxproc kern.maxprocperuid 2>/dev/null || true
          ulimit -n "$(ulimit -Hn)" 2>/dev/null || ulimit -n 10240 2>/dev/null || true
          ulimit -u "$(ulimit -Hu)" 2>/dev/null || ulimit -u 2048 2>/dev/null || true
          echo "after:  nofile=$(ulimit -n), nproc=$(ulimit -u 2>/dev/null || echo n/a)"
          for attempt in 1 2 3; do
            npm ci && exit 0
            echo "npm ci failed (attempt $attempt) — retrying in 15s" >&2
            sleep 15
          done
          exit 1
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # the "spawn /bin/sh ENOENT" failure reproduced deterministically at
          # the same point on every retry, right after one extension's `npm
          # audit` output — a broken code path in that step, not a resource
          # flake. Disabling audit/fund (noise nobody reads in CI anyway)
          # avoids it entirely instead of masking it with more retries.
          NPM_CONFIG_AUDIT: false
          NPM_CONFIG_FUND: false

      - name: Package
        shell: bash
        working-directory: upstream
        run: npm run gulp vscode-${{ matrix.target }}-min
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Archive (macOS)
        if: runner.os == 'macOS'
        # The .app bundle name comes from product.nameLong (see
        # upstream/build/lib/electron.ts's `productAppName: product.nameLong`),
        # not a fixed "Koder.app" — the LakshX rebrand of
        # product/product.overrides.json's nameLong changed the actual output
        # filename, which this step's old hardcoded reference didn't track
        # (found via a real CI failure: "Koder.app: No such file or
        # directory"). Glob for whatever .app actually landed instead of
        # hardcoding a name that will go stale on the next rebrand too.
        run: |
          cd VSCode-${{ matrix.target }}
          app=$(ls -d *.app)
          codesign --force --deep -s - "$app"
          ditto -c -k --keepParent "$app" ../${{ matrix.artifact }}.zip

      # A proper .deb package, not a tarball of loose files — same "download,
      # install one thing" experience Cursor/VS Code itself ships (and
      # matches the .exe installer below for Windows). The gulp tasks
      # (upstream/build/gulpfile.vscode.linux.ts, vscode-linux-x64-prepare-
      # deb + vscode-linux-x64-build-deb, run in series) use `fakeroot`/
      # `dpkg-deb` — already installed by this job's own "Linux build deps"
      # step above (`apt-get install ... fakeroot rpm`), so no new CI
      # tooling needed, same story as Windows's `innosetup` npm dependency.
      #
      # Three CI attempts at this failed identically on prepare-deb's own
      # rimraf step ("clean-amd64") with "Error: spawn /bin/sh ENOENT" — 100%
      # reproducible, ~10ms after starting. A 3x retry loop didn't help
      # (ruling out transient resource pressure) and neither did clearing
      # LD_LIBRARY_PATH (ruling out the setup-python shadowing theory — the
      # env dump in that failed run confirmed LD_LIBRARY_PATH was already
      # empty). Root cause, found by reading gulpfile.vscode.linux.ts
      # directly: `vscode-linux-x64-build-deb` is a bare task
      # (`buildDebPackage(arch)`), NOT `task.series(prepareDebTask,
      # buildDebPackage(arch))` like the snap variant a few lines below it
      # is — so passing both task names on one `gulp` command line runs them
      # in PARALLEL. build-deb's first exec() call needs to `cwd` into
      # `.build/linux/deb/amd64`, but prepare-deb's own rimraf step is
      # simultaneously deleting/recreating that exact directory — a genuine
      # race, not an environment issue, which is why retries and env
      # tweaks never touched it. Confirmed against Microsoft's own upstream
      # pipeline (build/azure-pipelines/linux/steps/product-build-linux-
      # compile.yml), which runs these as two SEPARATE `npm run gulp`
      # invocations rather than one combined command line — do the same
      # here so prepare-deb fully completes before build-deb starts.
      - name: Build Linux package
        if: runner.os == 'Linux'
        shell: bash
        working-directory: upstream
        run: |
          npm run gulp vscode-linux-x64-prepare-deb
          npm run gulp vscode-linux-x64-build-deb

      - name: Archive (Linux)
        if: runner.os == 'Linux'
        shell: bash
        # dpkg-deb names the output from the control file's Package/Version/
        # Architecture fields, not a fixed filename (unlike Windows's
        # hardcoded VSCodeSetup.exe) — glob for whatever actually landed
        # rather than guessing the exact name.
        run: cp upstream/.build/linux/deb/amd64/deb/*.deb "${{ matrix.artifact }}.deb"

      # A proper installer, not a zip of loose files — the same "download,
      # run one .exe" experience Cursor/VS Code itself ships. The gulp task
      # (upstream/build/gulpfile.vscode.win32.ts, vscode-win32-x64-system-
      # setup) runs Inno Setup via the `innosetup` npm devDependency already
      # installed by the "Install upstream dependencies" step above — no
      # extra tooling needed on the runner. Requires the win32*AppId GUIDs
      # in product/product.overrides.json and the AppX-packaging patch in
      # scripts/apply-ui.mjs (LakshX doesn't build Microsoft's separate
      # Windows Store package, so that branch is opted out rather than
      # quality-gated — see that script's comment for why).
      #
      # vscode-win32-x64-inno-updater MUST run first: it copies
      # inno_updater.exe/vcruntime140.dll into VSCode-win32-x64/tools/,
      # which code.iss's [Files] section unconditionally globs
      # ("tools/*") — running system-setup alone leaves that directory
      # empty and Inno Setup aborts with "No files found matching
      # ...\tools\*" (found the hard way on the first CI attempt at this).
      #
      # These two task names were previously passed to a SINGLE `npm run
      # gulp` invocation, relying on CLI argument order to guarantee
      # sequencing. That's the same shape as the Linux .deb race (see
      # "Build Linux package" above): gulp-cli's own source
      # (node_modules/gulp-cli/lib/versioned/^4.0.0/index.js) runs multiple
      # CLI task arguments via gulp.parallel() unless --series is passed,
      # and vscode-win32-x64-system-setup (build/gulpfile.vscode.win32.ts,
      # task.series(cleanTask, buildWin32Setup)) is never task.series-
      # chained with vscode-win32-x64-inno-updater — they're independent
      # task graphs. Microsoft's own pipeline (build/azure-pipelines/win32/
      # steps/product-build-win32-compile.yml) runs inno-updater as its own
      # separate `exec { npm run gulp ... }` step, never combined with
      # system-setup on one command line. Whether the combined form here
      # actually lost the race is unconfirmed (the tiny tools/ copy likely
      # finishes before ISCC.exe gets around to globbing it, so it can pass
      # by luck) — but the ordering was never actually enforced, so split
      # it the same way the Linux fix did rather than rely on that luck.
      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: bash
        working-directory: upstream
        run: |
          npm run gulp vscode-win32-x64-inno-updater
          npm run gulp vscode-win32-x64-system-setup

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        # Absolute-resolved (repoPath in gulpfile.vscode.win32.ts derives from
        # the module's own file location, not CWD), and this step — like the
        # original zip-based one it replaces — runs from the job's default
        # working directory (repo root), not `upstream/`, hence the prefix.
        run: Copy-Item "upstream\.build\win32-x64\system-setup\VSCodeSetup.exe" "${{ matrix.artifact }}.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.deb
            ${{ matrix.artifact }}.exe
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      # The build matrix produces .zip (macOS), .deb (Linux), and .exe
      # (Windows) — see the matching Archive/Package steps in the `build`
      # job above. Nothing in this pipeline ever produces a .tar.gz (a
      # stale leftover, likely from before the .deb/.exe packaging was
      # added); the old *.zip/*.tar.gz-only glob silently dropped the
      # Linux and Windows installers from the GitHub Release — the release
      # would have shipped the macOS build only. fail_on_unmatched_files is
      # left at its default (false) so one platform's build job failing
      # under fail-fast: false doesn't fail the whole release.
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            *.deb
            *.exe
          generate_release_notes: true

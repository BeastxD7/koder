<!DOCTYPE html>
<!--
  Static visual harness for media/panel.js — loads the real panel UI in a
  plain browser with a mock acquireVsCodeApi() standing in for extension.js.
  Serve the extension root over http (e.g. `python3 -m http.server` from
  product/lakshx-chat) and open /test/harness.html. Used to eyeball the
  slash-command popover, /help card, and toast without a VS Code host.
  NOT loaded by the extension — test-only.
-->
<html><head>
<meta charset="UTF-8">
<title>LakshX panel harness</title>
<link rel="stylesheet" href="../media/panel.css">
<link rel="stylesheet" href="../media/markdown.css">
<style>body { background: #0e1116; } #app { max-width: 420px; margin: 0 auto; border-left: 1px solid rgba(255,255,255,.08); border-right: 1px solid rgba(255,255,255,.08); }</style>
</head><body>
<div id="app">
  <div id="settingsPanel" hidden>
    <div class="settings-head"><span>AI Providers</span><button id="settingsClose" class="ghost" title="Close">&#10005;</button></div>
    <div class="settings-body" id="settingsBody"></div>
    <div class="settings-foot"><button id="settingsFile" class="ghost">Edit JSON</button><div class="spacer"></div><button id="settingsSave">Save</button></div>
  </div>
  <div id="historyPanel" hidden>
    <div class="settings-head"><span>Chat history</span><button id="historyClose" class="ghost" title="Close">&#10005;</button></div>
    <div class="settings-body" id="historyBody"></div>
  </div>
  <div id="whatsNewPanel" hidden>
    <div class="settings-head"><span>What's new</span><button id="whatsNewClose" class="ghost" title="Close">&#10005;</button></div>
    <div class="settings-body" id="whatsNewBody"></div>
  </div>
  <div id="topbar">
    <select id="modeSelect" title="Agent mode">
      <option value="review" selected>Review</option>
      <option value="approve">Approve</option>
      <option value="auto">Auto</option>
      <option value="royal">Royal</option>
    </select>
    <div class="spacer"></div>
    <button id="whatsNewBtn" class="ghost" title="What's new"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l1.9 5.8L20 11l-6.1 2.2L12 19l-1.9-5.8L4 11l6.1-2.2L12 3z"/></svg></button>
    <button id="historyBtn" class="ghost" title="Chat history"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></svg></button>
  </div>
  <div id="messages"></div>
  <div id="composer">
    <div id="planBar" hidden></div>
    <div id="permissionBar" hidden></div>
    <div id="attachRow" hidden></div>
    <div id="checkpointBar" class="checkpointbar" hidden>
      <button id="cpbarHead" class="cpbar-head" type="button"></button>
      <div id="cpbarBody" class="cpbar-body" hidden></div>
    </div>
    <div class="input-wrap">
      <div id="mentionPopup" class="mention-popup" hidden></div>
      <div id="slashPopup" class="mention-popup" hidden></div>
      <textarea id="input" rows="3" placeholder="Describe a task. Type @ to reference a file, / for commands."></textarea>
    </div>
    <div id="toolbar">
      <select id="model" title="Model"></select>
      <button id="diagBtn" class="ghost" title="Copy diagnostics"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg></button>
      <button id="attachBtn" class="ghost" title="Attach current file"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
      <div class="spacer"></div>
      <button id="stop" class="ghost" hidden>Stop</button>
      <button id="send">Send</button>
    </div>
  </div>
</div>
<script>
  // ---- mock extension host ----
  // Mirrors the subset of extension.js's onWebviewMessage the slash-command
  // feature exercises. Replies arrive async via window.postMessage, exactly
  // like a real webview host.
  const CUSTOM_COMMANDS = [
    { name: "fix-issue", description: "Fix a GitHub issue by number", source: "workspace",
      body: "Fix issue $ARGUMENTS following our conventions." },
    { name: "standup", description: "Draft a standup update from recent work", source: "user",
      body: "Draft a short standup update from my recent commits." },
  ];
  const reply = (msg) => setTimeout(() => window.postMessage(msg, "*"), 0);
  const expand = (body, args) => body.includes("$ARGUMENTS")
    ? body.split("$ARGUMENTS").join(args).trim()
    : (args ? body + "\n" + args : body);

  // Mini event-sourced transcript, mirroring extension.js's REPLAYABLE
  // handling just enough to exercise the conversation-rewind flow: user/
  // chunk/checkpoint/system/turnEnd/rewindAccepted events are recorded so
  // "rewindToPrompt" can truncate at the matching user event and push a full
  // replay — exactly what extension.js's applyRewind does.
  const REPLAYABLE = new Set(["user", "chunk", "system", "turnEnd", "checkpoint", "rewindAccepted", "modeChanged"]);
  const transcript = [];
  const post = (msg) => { if (REPLAYABLE.has(msg.type)) transcript.push(msg); reply(msg); };
  let promptSeq = 0;

  window.acquireVsCodeApi = () => ({
    getState() {}, setState() {},
    postMessage(m) {
      console.log("[panel→ext]", JSON.stringify(m));
      switch (m.type) {
        case "boot":
          reply({ type: "ready", models: { defaultModel: "anthropic/claude-sonnet-5", providers: ["anthropic"] } });
          reply({ type: "commands", commands: CUSTOM_COMMANDS.map(({ name, description, source }) => ({ name, description, source })) });
          break;
        case "refreshCommands":
          reply({ type: "commands", commands: CUSTOM_COMMANDS.map(({ name, description, source }) => ({ name, description, source })) });
          break;
        case "setMode":
          post({ type: "modeChanged", mode: m.mode, auto: false });
          break;
        case "send": {
          const promptId = "pr_harness_" + (++promptSeq);
          post({ type: "user", text: m.text, promptId });
          reply({ type: "turnStart" });
          setTimeout(() => {
            post({ type: "chunk", text: "(harness) echo: " + m.text });
            // one fake file change per turn so the rewind confirm has files to list
            post({ type: "checkpoint", promptId, toolCallId: "tc_" + promptSeq, toolName: "write_file", sha: "cafe" + promptSeq, files: ["src/change-" + promptSeq + ".js"] });
            post({ type: "turnEnd" });
          }, 400);
          break;
        }
        case "runCommand": {
          const cmd = CUSTOM_COMMANDS.find((c) => c.name === m.name);
          const text = cmd ? expand(cmd.body, m.args) : "(unknown command)";
          post({ type: "user", text, promptId: "pr_harness_cmd_" + (++promptSeq) });
          reply({ type: "turnStart" });
          setTimeout(() => { post({ type: "chunk", text: "(harness) agent turn started from /" + m.name }); post({ type: "turnEnd" }); }, 400);
          break;
        }
        case "rewindToPrompt": {
          // Mirrors extension.js applyRewind: truncate at the matching user
          // event (inclusive), system receipt, full replay.
          const idx = transcript.findIndex((e) => e.type === "user" && e.promptId === m.promptId);
          if (idx === -1) break;
          const label = String(transcript[idx].text ?? "").slice(0, 60);
          const removed = transcript.length - idx;
          transcript.length = idx;
          post({ type: "system", text: `Rewound to: "${label}" — ${removed} messages removed, 1 file reverted.` });
          reply({ type: "replay", events: transcript.slice() });
          break;
        }
        case "acceptTurn":
          post({ type: "rewindAccepted", promptId: m.promptId });
          break;
        case "copyDiagnostics":
          reply({ type: "diagnosticsCopied", ok: true, chars: 12345 });
          break;
        case "newChat":
          transcript.length = 0;
          reply({ type: "clear" });
          break;
        case "searchFiles":
          reply({ type: "fileResults", seq: m.seq, files: ["media/panel.js", "extension.js", "commands.js"].filter((f) => f.includes(m.q ?? "")) });
          break;
        case "undoPrompt":
          post({ type: "system", text: "Reverted 1 file(s) from that turn." });
          break;
      }
    },
  });
</script>
<script src="../media/markdown.js"></script>
<script src="../media/panel.js"></script>
</body></html>
